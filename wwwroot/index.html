<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Markers — ADO.NET + AJAX Demo</title>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1a73e8;
      --primary-d: #1558b0;
      --danger:    #e53935;
      --success:   #2e7d32;
      --bg:        #f5f7fa;
      --panel:     #ffffff;
      --border:    #dde1e7;
      --text:      #202124;
      --muted:     #6b7280;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,.1);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ───────────────────────────────────── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      flex-shrink: 0;
      z-index: 10;
    }
    header svg { flex-shrink: 0; }
    header h1  { font-size: 1.15rem; font-weight: 600; letter-spacing: .3px; }
    header span.badge {
      margin-left: auto;
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .8rem;
    }

    /* ─── Layout ───────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ──────────────────────────────────── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h2 {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ─── Form ─────────────────────────────────────── */
    .form-grid { display: flex; flex-direction: column; gap: 10px; }

    label { font-size: .8rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: 3px; }

    input[type=text], input[type=number], textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .875rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); background: #fff; }
    textarea { resize: vertical; min-height: 60px; }

    .coords-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .color-picker {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .color-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform .15s, border-color .15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: var(--text); transform: scale(1.15); }

    /* ─── Buttons ──────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 6px;
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary  { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-d); }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-sm       { padding: 5px 10px; font-size: .78rem; border-radius: 5px; }

    /* ─── Marker List ──────────────────────────────── */
    .marker-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .marker-list::-webkit-scrollbar { width: 5px; }
    .marker-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .marker-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid #f0f0f0;
    }
    .marker-item:hover { background: var(--bg); }
    .marker-item.active { background: #e8f0fe; }

    .marker-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .marker-info { flex: 1; min-width: 0; }
    .marker-info strong { font-size: .875rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .marker-info span   { font-size: .75rem; color: var(--muted); }

    .marker-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
    .marker-item:hover .marker-actions { opacity: 1; }

    /* ─── Toast ────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: .875rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--danger); }

    /* ─── Map ──────────────────────────────────────── */
    #map {
      flex: 1;
      position: relative;
    }

    .map-hint {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.6);
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: .8rem;
      pointer-events: none;
      z-index: 5;
    }

    /* ─── Loading ──────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: .9rem;
      color: var(--muted);
      gap: 10px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Edit mode banner ─────────────────────────── */
    #edit-banner {
      display: none;
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      padding: 6px 16px;
      font-size: .8rem;
      color: #856404;
      align-items: center;
      gap: 8px;
    }
    #edit-banner.show { display: flex; }
    #cancel-edit { margin-left: auto; }
  </style>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────────────────────── -->
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="rgba(255,255,255,0.9)"/>
    <circle cx="12" cy="9" r="2.5" fill="#1a73e8"/>
  </svg>
  <h1>Map Markers — ADO.NET + AJAX Demo</h1>
  <span class="badge" id="count-badge">0 markers</span>
</header>

<!-- ─── Layout ─────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Edit banner -->
    <div id="edit-banner">
      ✏️ Editing marker — update fields and save.
      <button type="button" class="btn btn-ghost btn-sm" id="cancel-edit">Cancel</button>
    </div>

    <!-- Add / Edit Form -->
    <div class="sidebar-section">
      <h2 id="form-heading">Add New Marker</h2>
      <div class="form-grid">
        <div>
          <label for="title">Title *</label>
          <input type="text" id="title" placeholder="e.g. Eiffel Tower" maxlength="100" />
        </div>
        <div>
          <label for="description">Description</label>
          <textarea id="description" placeholder="Optional notes…" maxlength="500"></textarea>
        </div>
        <div class="coords-row">
          <div>
            <label for="lat">Latitude *</label>
            <input type="number" id="lat" placeholder="48.8584" step="any" />
          </div>
          <div>
            <label for="lng">Longitude *</label>
            <input type="number" id="lng" placeholder="2.2945" step="any" />
          </div>
        </div>
        <div>
          <label>Pin Color</label>
          <div class="color-picker" id="color-picker">
            <!-- rendered by JS -->
          </div>
          <input type="hidden" id="selected-color" value="red" />
        </div>
        <button type="button" class="btn btn-primary" id="save-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          <span id="save-label">Add Marker</span>
        </button>
      </div>
    </div>

    <!-- Marker List -->
    <div class="sidebar-section" style="padding-bottom:8px">
      <h2>Saved Markers</h2>
    </div>
    <div class="marker-list" id="marker-list">
      <!-- populated by JS -->
    </div>

  </aside>

  <!-- Map -->
  <div id="map">
    <div id="loading">
      <div class="spinner"></div> Loading map & markers…
    </div>
    <div class="map-hint">Click on the map to set coordinates</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="app.js"></script>

</body>
</html>
